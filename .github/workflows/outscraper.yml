name: Outscraper Enrichment

on:
  workflow_dispatch:
    inputs:
      departments:
        description: 'Departments to scrape (comma-separated, e.g. 75,13,69)'
        required: true
        default: '75,13,69'
      free_tier:
        description: 'Free tier mode (max 500 fiches)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  enrich:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests outscraper beautifulsoup4

      - name: Run Outscraper enrichment
        env:
          OUTSCRAPER_API_KEY: ${{ secrets.OUTSCRAPER_API_KEY }}
        run: |
          if [ -z "$OUTSCRAPER_API_KEY" ]; then
            echo "ERROR: OUTSCRAPER_API_KEY secret is not set"
            exit 1
          fi
          ARGS="--dept ${{ inputs.departments }}"
          if [ "${{ inputs.free_tier }}" = "true" ]; then
            ARGS="$ARGS --free-tier"
          fi
          python3 scripts/outscraper_enrich.py $ARGS

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prospection/leads.json
          git add prospection/outscraper_*.json 2>/dev/null || true
          git add prospection/outscraper_*.csv 2>/dev/null || true
          git diff --cached --quiet && echo "No changes" && exit 0
          git stash --include-untracked || true
          git commit -m "chore: outscraper enrichment results"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && { git stash pop 2>/dev/null || true; exit 0; }
            echo "Push attempt $i failed, retrying..."
            sleep 2
          done
          git stash pop 2>/dev/null || true
          echo "ERROR: Failed to push"
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "## Outscraper Enrichment" >> $GITHUB_STEP_SUMMARY
          if [ -f prospection/outscraper_progress.json ]; then
            python3 -c "
          import json
          with open('prospection/outscraper_progress.json') as f:
              p = json.load(f)
          print(f'- **Fiches scraped**: {p.get(\"total_fiches\", 0)}')
          print(f'- **Departments**: {\", \".join(p.get(\"departments_done\", []))}')
          print(f'- **Cost**: \${p.get(\"total_fiches\", 0) * 3 / 1000:.2f}')
          " >> $GITHUB_STEP_SUMMARY
          fi
