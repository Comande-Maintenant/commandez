name: TGTG Scan

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scan mode: cities or grid'
        required: true
        default: 'cities'

permissions:
  contents: write

jobs:
  scan:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install tgtg requests beautifulsoup4

      - name: Run TGTG scan
        env:
          TGTG_EMAIL: augustin.foucheres@gmail.com
        run: python3 scripts/tgtg_scan.py --auth --email $TGTG_EMAIL && python3 scripts/tgtg_scan.py --scan --mode ${{ inputs.mode }} && python3 scripts/tgtg_scan.py --enrich

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prospection/leads.json prospection/tgtg_*.json prospection/tgtg_*.csv
          git diff --cached --quiet && exit 0
          git stash --include-untracked || true
          git commit -m "chore: TGTG scan results"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && { git stash pop 2>/dev/null || true; exit 0; }
            sleep 2
          done
